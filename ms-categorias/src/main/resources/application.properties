spring.application.name=ms-categorias
server.port=8082


spring.datasource.url=jdbc:mysql://localhost:3306/pasteleria_categorias?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true




logging.level.root=INFO
logging.level.com.pasteleria=DEBUG
logging.file.name=logs/ms-categorias.log
