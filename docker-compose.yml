version: '3.8'

services:

  ms-eureka-server:
    build: ./ms-eureka-server
    container_name: ms-eureka-server
    ports:
      - "8761:8761"
    networks:
      - pasteleria-network

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    ports:
      - "8080:8080"
    depends_on:
      - ms-eureka-server
    environment:
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://ms-eureka-server:8761/eureka/
    networks:
      - pasteleria-network

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    ports:
      - "8090:8089"
    depends_on:
      - ms-eureka-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/pasteleria_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://ms-eureka-server:8761/eureka/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pasteleria-network

  ms-usuarios:
    build: ./ms-usuarios
    container_name: ms-usuarios
    ports:
      - "8092:8081"
    depends_on:
      - ms-eureka-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/pasteleria_usuarios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://ms-eureka-server:8761/eureka/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pasteleria-network

  ms-categorias:
