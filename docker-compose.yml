      - "8094:8084"
    depends_on:
      - ms-eureka-server
      - ms-usuarios
      - ms-productos
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/pasteleria_pedidos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
