      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/pasteleria_categorias?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://ms-eureka-server:8761/eureka/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pasteleria-network

  ms-productos:
