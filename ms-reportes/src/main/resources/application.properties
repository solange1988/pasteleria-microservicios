spring.application.name=ms-reportes
server.port=8088



spring.datasource.url=jdbc:mysql://localhost:3306/pasteleria_reportes?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true


ms.pedidos.url=http://localhost:8084
ms.pagos.url=http://localhost:8086
ms.productos.url=http://localhost:8083


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


logging.level.root=INFO
logging.level.com.pasteleria=DEBUG
logging.file.name=logs/ms-reportes.log
