spring.application.name=ms-productos
server.port=8083



spring.datasource.url=jdbc:mysql://localhost:3306/pasteleria_productos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true


ms.categorias.url=http://localhost:8082


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


logging.level.com.pasteleria=DEBUG
logging.level.root=INFO
logging.file.name=logs/ms-productos.lo
